name: Raw Clock Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - runtime-selection-proof
    paths:
      - ".github/workflows/raw-clock-matrix.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "examples/raw_clock_matrix*.rs"
      - "src/**"
      - "tools/raw-clock-runner/**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOTCLOCK_RAW_CLOCK_WARMUP_ITERS: 10000
  HOTCLOCK_RAW_CLOCK_MEASURE_ITERS: 500000
  HOTCLOCK_RAW_CLOCK_SAMPLES: 31
  HOTCLOCK_RAW_CLOCK_ATTEMPTS: 3

jobs:
  build-linux-x86_64:
    name: build / x86_64-unknown-linux-gnu
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build raw clock benchmark
        run: cargo build --features bench-internals,comparison-crates --example raw_clock_matrix --release

      - name: Upload raw clock binary
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64
          path: target/release/examples/raw_clock_matrix

  build-linux-aarch64:
    name: build / aarch64-unknown-linux-gnu
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build raw clock benchmark
        run: cargo build --features bench-internals,comparison-crates --example raw_clock_matrix --release

      - name: Upload raw clock binary
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-binary-linux-aarch64
          path: target/release/examples/raw_clock_matrix

  build-linux-x86_64-musl:
    name: build / x86_64-unknown-linux-musl
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-unknown-linux-musl

      - name: Build static raw clock benchmark
        run: |
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc \
          CARGO_TARGET_DIR="$PWD/target/raw-clock-runner-musl" \
            cargo build \
              --manifest-path tools/raw-clock-runner/Cargo.toml \
              --locked \
              --features bench-internals \
              --release \
              --target x86_64-unknown-linux-musl
          mkdir -p target/musl-prebuilt
          cp target/raw-clock-runner-musl/x86_64-unknown-linux-musl/release/hotclock-raw-clock-runner \
            target/musl-prebuilt/raw_clock_matrix

      - name: Upload static raw clock binary
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64-musl
          path: target/musl-prebuilt/raw_clock_matrix

  linux-native-x86_64:
    name: linux native x86_64 / ${{ matrix.name }}
    needs: build-linux-x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04-x64-vm
            runner: ubuntu-22.04
          - name: ubuntu-24.04-x64-vm
            runner: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Download raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64
          path: target/prebuilt

      - name: Run raw clock benchmark
        shell: bash
        run: |
          chmod +x target/prebuilt/raw_clock_matrix
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT="${{ matrix.name }}" \
            HOTCLOCK_RAW_CLOCK_REPORT_DIR="target/raw-clock-${{ matrix.name }}" \
            target/prebuilt/raw_clock_matrix

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  linux-native-aarch64:
    name: linux native aarch64 / ${{ matrix.name }}
    needs: build-linux-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04-arm64-vm
            runner: ubuntu-22.04-arm
          - name: ubuntu-24.04-arm64-vm
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Download raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: raw-clock-binary-linux-aarch64
          path: target/prebuilt

      - name: Run raw clock benchmark
        shell: bash
        run: |
          chmod +x target/prebuilt/raw_clock_matrix
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT="${{ matrix.name }}" \
            HOTCLOCK_RAW_CLOCK_REPORT_DIR="target/raw-clock-${{ matrix.name }}" \
            target/prebuilt/raw_clock_matrix

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  linux-native-x86_64-musl:
    name: linux native x86_64 musl / linux-x86_64-musl-native-vm
    needs: build-linux-x86_64-musl
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Download static raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64-musl
          path: target/prebuilt

      - name: Run static raw clock benchmark
        shell: bash
        run: |
          chmod +x target/prebuilt/raw_clock_matrix
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT="linux-x86_64-musl-native-vm" \
            HOTCLOCK_RAW_CLOCK_REPORT_DIR="target/raw-clock-linux-x86_64-musl-native-vm" \
            target/prebuilt/raw_clock_matrix

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-linux-x86_64-musl-native-vm
          path: target/raw-clock-linux-x86_64-musl-native-vm/**

  linux-rdpmc-policy-x86_64:
    name: linux rdpmc policy x86_64
    needs: build-linux-x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Download raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64
          path: target/prebuilt

      - name: Run host default policy benchmark
        shell: bash
        run: |
          chmod +x target/prebuilt/raw_clock_matrix
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT="linux-amd64-host-default-perf-policy" \
            HOTCLOCK_RAW_CLOCK_REPORT_DIR="target/raw-clock-linux-amd64-host-default-perf-policy" \
            target/prebuilt/raw_clock_matrix

      - name: Run default Docker policy benchmark
        shell: bash
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD:/work" \
            -w /work \
            -e HOTCLOCK_RAW_CLOCK_ENVIRONMENT="linux-amd64-docker-default-seccomp-perf-policy" \
            -e HOTCLOCK_RAW_CLOCK_REPORT_DIR="/work/target/raw-clock-linux-amd64-docker-default-seccomp-perf-policy" \
            -e HOTCLOCK_RAW_CLOCK_WARMUP_ITERS \
            -e HOTCLOCK_RAW_CLOCK_MEASURE_ITERS \
            -e HOTCLOCK_RAW_CLOCK_SAMPLES \
            -e HOTCLOCK_RAW_CLOCK_ATTEMPTS \
            ubuntu:22.04 \
            /work/target/prebuilt/raw_clock_matrix

      - name: Open host PMU policy when allowed
        shell: bash
        run: |
          set -x
          cat /proc/sys/kernel/perf_event_paranoid || true
          cat /sys/bus/event_source/devices/cpu/rdpmc || true
          cat /sys/devices/cpu/rdpmc || true
          sudo sysctl -w kernel.perf_event_paranoid=2 || true
          for path in /sys/bus/event_source/devices/cpu/rdpmc /sys/devices/cpu/rdpmc; do
            if [ -e "$path" ]; then
              echo 2 | sudo tee "$path" || true
            fi
          done
          cp target/prebuilt/raw_clock_matrix target/prebuilt/raw_clock_matrix_cap
          sudo setcap cap_perfmon,cap_sys_admin,cap_sys_ptrace+ep target/prebuilt/raw_clock_matrix_cap || \
            sudo setcap cap_sys_admin,cap_sys_ptrace+ep target/prebuilt/raw_clock_matrix_cap || true
          getcap target/prebuilt/raw_clock_matrix_cap || true
          cat /proc/sys/kernel/perf_event_paranoid || true
          cat /sys/bus/event_source/devices/cpu/rdpmc || true
          cat /sys/devices/cpu/rdpmc || true

      - name: Run host opened policy benchmark
        shell: bash
        run: |
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT="linux-amd64-host-opened-perf-policy" \
            HOTCLOCK_RAW_CLOCK_REPORT_DIR="target/raw-clock-linux-amd64-host-opened-perf-policy" \
            target/prebuilt/raw_clock_matrix_cap

      - name: Run privileged Docker policy benchmark
        shell: bash
        run: |
          docker run --rm \
            --privileged \
            --security-opt seccomp=unconfined \
            --platform linux/amd64 \
            -v "$PWD:/work" \
            -w /work \
            -e HOTCLOCK_RAW_CLOCK_ENVIRONMENT="linux-amd64-docker-privileged-perf-policy" \
            -e HOTCLOCK_RAW_CLOCK_REPORT_DIR="/work/target/raw-clock-linux-amd64-docker-privileged-perf-policy" \
            -e HOTCLOCK_RAW_CLOCK_WARMUP_ITERS \
            -e HOTCLOCK_RAW_CLOCK_MEASURE_ITERS \
            -e HOTCLOCK_RAW_CLOCK_SAMPLES \
            -e HOTCLOCK_RAW_CLOCK_ATTEMPTS \
            ubuntu:22.04 \
            sh -c '
              cat /proc/sys/kernel/perf_event_paranoid || true
              cat /sys/bus/event_source/devices/cpu/rdpmc || true
              cat /sys/devices/cpu/rdpmc || true
              /work/target/prebuilt/raw_clock_matrix
            '

      - name: Upload raw clock reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-linux-rdpmc-policy-x86_64
          path: target/raw-clock-linux-amd64-*perf-policy/**

  linux-docker:
    name: linux docker / ${{ matrix.name }}
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64-docker-on-x64
            runner: ubuntu-24.04
            platform: linux/amd64
            artifact: raw-clock-binary-linux-x86_64
          - name: linux-amd64-docker-on-arm64
            runner: ubuntu-24.04-arm
            platform: linux/amd64
            artifact: raw-clock-binary-linux-x86_64
          - name: linux-arm64-docker-on-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: raw-clock-binary-linux-aarch64
          - name: linux-arm64-docker-on-x64
            runner: ubuntu-24.04
            platform: linux/arm64
            artifact: raw-clock-binary-linux-aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: contains(matrix.name, '-on-arm64') && matrix.platform == 'linux/amd64' || contains(matrix.name, '-on-x64') && matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Download raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/prebuilt

      - name: Run raw clock benchmark in Docker
        shell: bash
        run: |
          chmod +x target/prebuilt/raw_clock_matrix
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "$PWD:/work" \
            -w /work \
            -e HOTCLOCK_RAW_CLOCK_ENVIRONMENT="${{ matrix.name }}" \
            -e HOTCLOCK_RAW_CLOCK_REPORT_DIR="/work/target/raw-clock-${{ matrix.name }}" \
            -e HOTCLOCK_RAW_CLOCK_WARMUP_ITERS \
            -e HOTCLOCK_RAW_CLOCK_MEASURE_ITERS \
            -e HOTCLOCK_RAW_CLOCK_SAMPLES \
            -e HOTCLOCK_RAW_CLOCK_ATTEMPTS \
            ubuntu:22.04 \
            /work/target/prebuilt/raw_clock_matrix

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  linux-qemu-rust:
    name: linux qemu rust / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-386-rust-on-x64
            runner: ubuntu-24.04
            platform: linux/386
          - name: linux-386-rust-on-arm64
            runner: ubuntu-24.04-arm
            platform: linux/386
          - name: linux-riscv64-rust-on-x64
            runner: ubuntu-24.04
            platform: linux/riscv64
          - name: linux-riscv64-rust-on-arm64
            runner: ubuntu-24.04-arm
            platform: linux/riscv64
          - name: linux-ppc64le-rust-on-x64
            runner: ubuntu-24.04
            platform: linux/ppc64le
          - name: linux-ppc64le-rust-on-arm64
            runner: ubuntu-24.04-arm
            platform: linux/ppc64le
          - name: linux-s390x-rust-on-x64
            runner: ubuntu-24.04
            platform: linux/s390x
          - name: linux-s390x-rust-on-arm64
            runner: ubuntu-24.04-arm
            platform: linux/s390x

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run raw clock benchmark in target Rust container
        shell: bash
        run: |
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "$PWD:/work" \
            -w /work \
            -e CARGO_TARGET_DIR="/work/target/raw-clock-build-${{ matrix.name }}" \
            -e HOTCLOCK_RAW_CLOCK_ENVIRONMENT="${{ matrix.name }}" \
            -e HOTCLOCK_RAW_CLOCK_REPORT_DIR="/work/target/raw-clock-${{ matrix.name }}" \
            -e HOTCLOCK_RAW_CLOCK_WARMUP_ITERS \
            -e HOTCLOCK_RAW_CLOCK_MEASURE_ITERS=200000 \
            -e HOTCLOCK_RAW_CLOCK_SAMPLES \
            -e HOTCLOCK_RAW_CLOCK_ATTEMPTS \
            rust:1-slim \
            sh -c 'rustc -vV && cargo run --manifest-path tools/raw-clock-runner/Cargo.toml --locked --features bench-internals --release'

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  linux-wrapped-x86_64:
    name: linux wrapped x86_64 / ${{ matrix.name }}
    needs: build-linux-x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64-qemu-user-default-on-x64
            wrapper: qemu-x86_64
            measure_iters: 200000
          - name: linux-amd64-qemu-user-qemu64-on-x64
            wrapper: qemu-x86_64 -cpu qemu64
            measure_iters: 200000
          - name: linux-amd64-qemu-user-max-on-x64
            wrapper: qemu-x86_64 -cpu max
            measure_iters: 200000
          - name: linux-amd64-valgrind-none-on-x64
            wrapper: valgrind --tool=none --quiet
            measure_iters: 50000
          - name: linux-amd64-valgrind-memcheck-on-x64
            wrapper: valgrind --tool=memcheck --quiet
            measure_iters: 20000
          - name: linux-amd64-rr-record-on-x64
            wrapper: rr record -n
            measure_iters: 10000

    steps:
      - uses: actions/checkout@v6

      - name: Install wrapped runners
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user valgrind rr
          sudo sysctl -w kernel.perf_event_paranoid=1 || true
          sudo sysctl -w kernel.kptr_restrict=0 || true

      - name: Download raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64
          path: target/prebuilt

      - name: Run raw clock benchmark with wrapped child reads
        shell: bash
        run: |
          chmod +x target/prebuilt/raw_clock_matrix
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT="${{ matrix.name }}" \
            HOTCLOCK_RAW_CLOCK_REPORT_DIR="target/raw-clock-${{ matrix.name }}" \
            HOTCLOCK_RAW_CLOCK_CHILD_WRAPPER="${{ matrix.wrapper }}" \
            HOTCLOCK_RAW_CLOCK_MEASURE_ITERS="${{ matrix.measure_iters }}" \
            target/prebuilt/raw_clock_matrix

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  linux-qemu-system-x86_64:
    name: linux qemu-system x86_64 / ${{ matrix.name }}
    needs: build-linux-x86_64-musl
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-musl-qemu-system-qemu64-tcg
            cpu: qemu64
            qemu_args: ""
            measure_iters: 50000
          - name: linux-x86_64-musl-qemu-system-max-tcg
            cpu: max
            qemu_args: ""
            measure_iters: 50000
          - name: linux-x86_64-musl-qemu-system-qemu64-icount-tcg
            cpu: qemu64
            qemu_args: "-icount shift=0,align=off,sleep=off"
            measure_iters: 20000

    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y busybox-static cpio jq qemu-system-x86

      - name: Download static raw clock binary
        uses: actions/download-artifact@v4
        with:
          name: raw-clock-binary-linux-x86_64-musl
          path: target/prebuilt

      - name: Run static raw clock benchmark in QEMU system emulation
        shell: bash
        run: |
          set -euo pipefail

          host_kernel="$(ls /boot/vmlinuz-* | sort -V | tail -n1)"
          kernel="target/qemu-kernel-${{ matrix.name }}"
          sudo cp "$host_kernel" "$kernel"
          sudo chmod 0644 "$kernel"
          report_dir="target/raw-clock-${{ matrix.name }}"
          root="target/qemu-initramfs-${{ matrix.name }}"
          mkdir -p "$report_dir" "$root/bin" "$root/dev" "$root/proc" "$root/sys" "$root/tmp"

          cp target/prebuilt/raw_clock_matrix "$root/bin/raw_clock_matrix"
          cp /bin/busybox "$root/bin/busybox"
          chmod +x "$root/bin/raw_clock_matrix" "$root/bin/busybox"
          for applet in sh mount poweroff sync; do
            ln -sf busybox "$root/bin/$applet"
          done

          cat > "$root/init" <<'SH'
          #!/bin/sh
          mount -t devtmpfs devtmpfs /dev 2>/dev/null || true
          mount -t proc proc /proc 2>/dev/null || true
          mount -t sysfs sysfs /sys 2>/dev/null || true

          export PATH=/bin
          export HOTCLOCK_RAW_CLOCK_ENVIRONMENT="__ENVIRONMENT__"
          export HOTCLOCK_RAW_CLOCK_STDOUT=json
          export HOTCLOCK_RAW_CLOCK_WARMUP_ITERS=1000
          export HOTCLOCK_RAW_CLOCK_MEASURE_ITERS="__MEASURE_ITERS__"
          export HOTCLOCK_RAW_CLOCK_SAMPLES=21
          export HOTCLOCK_RAW_CLOCK_ATTEMPTS=3

          echo HOTCLOCK_JSON_BEGIN
          /bin/raw_clock_matrix
          echo HOTCLOCK_JSON_END

          sync
          poweroff -f
          SH
          sed -i \
            -e 's/__ENVIRONMENT__/${{ matrix.name }}/g' \
            -e 's/__MEASURE_ITERS__/${{ matrix.measure_iters }}/g' \
            "$root/init"
          chmod +x "$root/init"

          (cd "$root" && find . -print0 | cpio --null -o --format=newc | gzip -9) > target/qemu-initramfs-${{ matrix.name }}.cpio.gz

          set +e
          timeout 600 qemu-system-x86_64 \
            -machine accel=tcg \
            -cpu "${{ matrix.cpu }}" \
            -m 512M \
            -nographic \
            -no-reboot \
            -kernel "$kernel" \
            -initrd "target/qemu-initramfs-${{ matrix.name }}.cpio.gz" \
            -append "console=ttyS0 panic=-1 quiet rdinit=/init" \
            ${{ matrix.qemu_args }} \
            > "$report_dir/qemu.log" 2>&1
          qemu_status=$?
          set -e

          awk '/HOTCLOCK_JSON_BEGIN/{emit=1; next} /HOTCLOCK_JSON_END/{emit=0} emit' \
            "$report_dir/qemu.log" > "$report_dir/raw-clock-report.json"
          jq -e . "$report_dir/raw-clock-report.json"

          {
            echo "# hotclock raw clock benchmark"
            echo
            echo "Environment: \`${{ matrix.name }}\`"
            echo
            echo "## Clocks"
            echo
            echo "| Clock | Source | Operation | ns/op |"
            echo "|---|---|---|---:|"
            jq -r '.clocks[] | "| `\(.name)` | \(.source) | \(.operation) | \((.ns_op // "failed")|tostring) |"' \
              "$report_dir/raw-clock-report.json"
          } > "$report_dir/raw-clock-report.md"

          if [ "$qemu_status" -ne 0 ]; then
            echo "qemu exited with status $qemu_status after producing a parseable report" >&2
          fi

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  macos-x86_64:
    name: macos x86_64 / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-15-intel-native
            runner: macos-15-intel
            translated: false
          - name: macos-26-intel-native
            runner: macos-26-intel
            translated: false
          - name: macos-15-rosetta-on-arm64
            runner: macos-15
            translated: true
          - name: macos-26-rosetta-on-arm64
            runner: macos-26
            translated: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-apple-darwin

      - name: Install Rosetta
        if: matrix.translated
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Build raw clock benchmark
        run: cargo build --features bench-internals,comparison-crates --example raw_clock_matrix --release --target x86_64-apple-darwin

      - name: Run raw clock benchmark
        run: |
          if [ "${{ matrix.translated }}" = "true" ]; then
            arch -x86_64 target/x86_64-apple-darwin/release/examples/raw_clock_matrix
          else
            target/x86_64-apple-darwin/release/examples/raw_clock_matrix
          fi
        env:
          HOTCLOCK_RAW_CLOCK_ENVIRONMENT: ${{ matrix.name }}
          HOTCLOCK_RAW_CLOCK_REPORT_DIR: target/raw-clock-${{ matrix.name }}

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  windows-x86_64:
    name: windows x86_64 / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-2022-x64-native
            runner: windows-2022
          - name: windows-2025-x64-native
            runner: windows-2025
          - name: windows-11-arm-x64-emulated
            runner: windows-11-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Build raw clock benchmark
        shell: pwsh
        run: cargo build --features bench-internals,comparison-crates --example raw_clock_matrix --release --target x86_64-pc-windows-msvc

      - name: Run raw clock benchmark
        shell: pwsh
        run: |
          $env:HOTCLOCK_RAW_CLOCK_ENVIRONMENT = "${{ matrix.name }}"
          $env:HOTCLOCK_RAW_CLOCK_REPORT_DIR = "target/raw-clock-${{ matrix.name }}"
          & target\x86_64-pc-windows-msvc\release\examples\raw_clock_matrix.exe

      - name: Upload raw clock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-${{ matrix.name }}
          path: target/raw-clock-${{ matrix.name }}/**

  analyze:
    name: analyze raw clock matrix
    runs-on: ubuntu-24.04
    needs:
      - linux-native-x86_64
      - linux-native-aarch64
      - linux-native-x86_64-musl
      - linux-rdpmc-policy-x86_64
      - linux-docker
      - linux-qemu-rust
      - linux-wrapped-x86_64
      - linux-qemu-system-x86_64
      - macos-x86_64
      - windows-x86_64
    if: always()

    steps:
      - uses: actions/checkout@v6

      - name: Download raw clock reports
        uses: actions/download-artifact@v4
        with:
          path: target/raw-clock-artifacts
          pattern: raw-clock-*
          merge-multiple: false

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Analyze raw clock matrix
        run: cargo run --features bench-internals --example raw_clock_matrix_analyze -- target/raw-clock-artifacts
        env:
          HOTCLOCK_RAW_CLOCK_MATRIX_DIR: target/raw-clock-matrix

      - name: Upload raw clock matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-clock-matrix
          path: target/raw-clock-matrix/**
